<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PillStack — 분석 결과 UI 프리뷰 (3탭)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --card-border: rgba(255,255,255,0.06);
      --text: #e8e8ed;
      --text-sec: #a0a0b8;
      --text-dim: #6a6a80;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.15);
      --green: #4ade80; --green-bg: rgba(74,222,128,0.1);
      --yellow: #fbbf24; --yellow-bg: rgba(251,191,36,0.1);
      --red: #f87171; --red-bg: rgba(248,113,113,0.1);
      --blue: #60a5fa; --blue-bg: rgba(96,165,250,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; max-width:420px; margin:0 auto; }

    .dev-badge { background:var(--red); color:#fff; font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; display:inline-block; margin:16px 16px 0; letter-spacing:0.5px; }

    /* ─── Page Header ─── */
    .page-header { padding:16px; display:flex; align-items:center; justify-content:space-between; }
    .page-header h1 { font-size:18px; font-weight:700; }
    .close-btn { background:none; border:none; color:var(--text-dim); font-size:20px; cursor:pointer; }

    /* ─── Score Section ─── */
    .score-section { text-align:center; padding:8px 0 16px; }
    .score-ring { position:relative; width:120px; height:120px; margin:0 auto 10px; }
    .score-ring svg { transform:rotate(-90deg); }
    .score-ring circle { fill:none; stroke-width:7; }
    .score-ring .track { stroke:rgba(255,255,255,0.05); }
    .score-ring .fill { stroke-linecap:round; transition:stroke-dashoffset 1.5s ease; }
    .score-value { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:36px; font-weight:800; }
    .score-label { font-size:11px; color:var(--text-dim); }
    .score-grade { font-size:13px; font-weight:600; margin-top:2px; }

    /* ─── Summary Card ─── */
    .summary-card { background:linear-gradient(135deg, rgba(99,102,241,0.12), rgba(99,102,241,0.03)); border:1px solid rgba(99,102,241,0.2); border-radius:14px; padding:16px; margin:0 16px 16px; }
    .summary-headline { font-size:13px; font-weight:600; line-height:1.6; margin-bottom:10px; }
    .summary-action { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:var(--accent); background:rgba(99,102,241,0.08); border-radius:10px; padding:10px 12px; }

    /* ─── Stats Row ─── */
    .stats-row { display:flex; gap:8px; padding:0 16px; margin-bottom:16px; }
    .stat-card { flex:1; background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:12px 8px; text-align:center; }
    .stat-icon { font-size:20px; }
    .stat-value { font-size:18px; font-weight:700; margin-top:4px; }
    .stat-label { font-size:10px; color:var(--text-dim); margin-top:2px; }

    /* ─── Tabs ─── */
    .tabs { display:flex; gap:0; padding:0 16px; margin-bottom:16px; border-bottom:1px solid var(--card-border); }
    .tab-btn { flex:1; background:none; border:none; color:var(--text-dim); font-size:12px; font-weight:600; padding:10px 4px; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; position:relative; }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-btn .badge { background:var(--red); color:#fff; font-size:9px; font-weight:700; padding:1px 5px; border-radius:8px; margin-left:4px; vertical-align:top; }
    .tab-content { display:none; padding:0 16px 24px; }
    .tab-content.active { display:block; }

    /* ─── Tab 1: Routine Timeline ─── */
    .routine-item { display:flex; gap:12px; position:relative; padding-bottom:18px; }
    .routine-item:last-child { padding-bottom:0; }
    .routine-dot { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; z-index:1; }
    .routine-item:not(:last-child)::before { content:''; position:absolute; left:16px; top:34px; bottom:0; width:2px; background:rgba(255,255,255,0.06); }
    .dot-morning { background:linear-gradient(135deg,#fbbf24,#f59e0b); }
    .dot-evening { background:linear-gradient(135deg,#a78bfa,#7c3aed); }
    .dot-bedtime { background:linear-gradient(135deg,#6366f1,#4f46e5); }
    .routine-body { flex:1; }
    .routine-time { font-size:12px; font-weight:700; margin-bottom:4px; }
    .routine-pills { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:4px; }
    .r-pill { background:rgba(255,255,255,0.06); border:1px solid var(--card-border); border-radius:8px; padding:4px 10px; font-size:11px; font-weight:500; }
    .routine-note { font-size:10px; color:var(--text-dim); line-height:1.4; }
    .time-picker { display:flex; align-items:center; gap:4px; background:rgba(255,255,255,0.04); border:1px solid var(--card-border); border-radius:8px; padding:4px 8px; font-size:11px; color:var(--text-sec); cursor:pointer; margin-top:6px; width:fit-content; }

    /* ─── Tab 2: Triage Cards ─── */
    .triage-card { border-radius:12px; padding:14px; margin-bottom:10px; border:1px solid; }
    .triage-card.critical { background:var(--red-bg); border-color:rgba(248,113,113,0.2); }
    .triage-card.caution { background:var(--yellow-bg); border-color:rgba(251,191,36,0.2); }
    .triage-card.info { background:var(--blue-bg); border-color:rgba(96,165,250,0.15); }
    .triage-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .triage-badge { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding:2px 7px; border-radius:5px; }
    .critical .triage-badge { background:rgba(248,113,113,0.2); color:var(--red); }
    .caution .triage-badge { background:rgba(251,191,36,0.2); color:var(--yellow); }
    .info .triage-badge { background:rgba(96,165,250,0.15); color:var(--blue); }
    .triage-title { font-size:13px; font-weight:600; }
    .triage-detail { font-size:11px; color:var(--text-sec); margin-bottom:8px; line-height:1.5; }
    .triage-action { font-size:11px; font-weight:500; display:flex; align-items:center; gap:5px; }
    .critical .triage-action { color:var(--red); }
    .caution .triage-action { color:var(--yellow); }
    .info .triage-action { color:var(--blue); }
    .triage-prods { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
    .triage-prod { font-size:9px; background:rgba(255,255,255,0.06); padding:2px 7px; border-radius:4px; color:var(--text-dim); }

    .nutrient-card { background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:12px; margin-bottom:8px; }
    .nutrient-name { font-size:12px; font-weight:600; margin-bottom:6px; }
    .nutrient-tags { display:flex; flex-wrap:wrap; gap:4px; }
    .n-tag { font-size:9px; background:var(--accent-glow); color:var(--accent); padding:2px 7px; border-radius:5px; border:1px solid rgba(99,102,241,0.15); }

    /* ─── Tab 3: Deficiency Grid ─── */
    .def-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .def-card { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:14px; text-align:center; }
    .def-icon { font-size:22px; margin-bottom:4px; }
    .def-name { font-size:11px; font-weight:600; margin-bottom:4px; }
    .def-status { font-size:9px; font-weight:600; padding:2px 8px; border-radius:5px; display:inline-block; }
    .def-status.sufficient { background:var(--green-bg); color:var(--green); }
    .def-status.partial { background:var(--yellow-bg); color:var(--yellow); }
    .def-status.missing { background:var(--red-bg); color:var(--red); }
    .def-rec { font-size:9px; color:var(--text-dim); margin-top:6px; line-height:1.4; }
    .def-prods { font-size:9px; color:var(--text-sec); margin-top:4px; }
    .section-label { font-size:12px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }

    .ai-disclaimer { background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:12px; font-size:10px; color:var(--text-dim); line-height:1.6; margin-top:16px; }

    @keyframes scoreIn { from { stroke-dashoffset:389; } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .anim { animation:fadeUp 0.4s ease forwards; opacity:0; }
  </style>
</head>
<body>
  <span class="dev-badge">🛠 DEV PREVIEW — 프로덕션 미반영</span>
  <div id="app"></div>

  <script>
    // ═══════════════════════════════════════════
    // 목업 데이터
    // ═══════════════════════════════════════════
    const MOCK = {
      summary: {
        headline: "비타민D는 충분하지만, 칼슘 흡수를 위해 복용 시간 조정이 필요합니다.",
        keyAction: "센트룸은 아침 식후에, 종근당 비타민D는 저녁 식후로 분리하세요.",
        healthScore: 75
      },
      optimizedRoutine: [
        { time: "아침 (식후)", products: ["센트룸 멀티비타민", "NOW 오메가3"], note: "철분 흡수 최적 타이밍 + 지용성 비타민 흡수율 극대화" },
        { time: "저녁 (식후)", products: ["종근당 비타민D 3000IU"], note: "칼슘/철분 충돌 회피를 위해 아침과 분리" },
        { time: "취침 전", products: ["마그네슘 (추가 권장)"], note: "수면의 질 향상 + 근육 이완 효과" }
      ],
      technicalAnalysis: [
        {
          level: "critical",
          title: "비타민D 합산 3,400IU — 상한치 85%",
          detail: "종근당 비타민D(3000IU) + 센트룸(400IU) 합산 시 일일 상한섭취량(4,000IU)의 85%에 도달합니다. 장기 복용 시 칼슘 과다 축적 위험.",
          action: "종근당 비타민D를 격일 복용으로 전환하세요",
          products: ["종근당 비타민D", "센트룸 멀티비타민"],
          nutrients: ["비타민D"]
        },
        {
          level: "caution",
          title: "칼슘 ↔ 철분 흡수 경쟁",
          detail: "센트룸의 칼슘(200mg)과 철분(8mg)이 동시에 포함되어 있어, 철분 흡수율이 약 60% 감소할 수 있습니다.",
          action: "철분이 필요하다면 별도 철분제를 공복에 복용하세요",
          products: ["센트룸 멀티비타민"],
          nutrients: ["칼슘", "철분"]
        },
        {
          level: "caution",
          title: "아연 ↔ 구리 흡수 경쟁",
          detail: "센트룸의 아연(11mg)이 구리 흡수를 방해할 수 있습니다. 현재 수준은 안전 범위이나 별도 아연 추가 시 주의.",
          action: "추가 아연 보충제를 복용하지 마세요",
          products: ["센트룸 멀티비타민"],
          nutrients: ["아연", "구리"]
        },
        {
          level: "info",
          title: "비타민D + 칼슘 시너지 효과",
          detail: "비타민D가 칼슘의 소장 흡수율을 2배 이상 촉진합니다. 현재 조합에서 잘 작동 중.",
          action: "",
          products: ["종근당 비타민D", "센트룸 멀티비타민"],
          nutrients: ["비타민D", "칼슘"]
        },
        {
          level: "info",
          title: "오메가3 + 지용성 비타민 시너지",
          detail: "오메가3의 지방 성분이 비타민D, E, K 등 지용성 비타민 흡수를 촉진합니다.",
          action: "",
          products: ["NOW 오메가3", "센트룸 멀티비타민"],
          nutrients: ["EPA", "DHA", "비타민D"]
        }
      ],
      deficiencies: [
        { nutrient: "비타민D", dailyRecommended: "800IU", status: "sufficient", coveringProducts: ["종근당 비타민D", "센트룸"], recommendation: "" },
        { nutrient: "오메가3", dailyRecommended: "500mg", status: "sufficient", coveringProducts: ["NOW 오메가3"], recommendation: "" },
        { nutrient: "마그네슘", dailyRecommended: "350mg", status: "missing", coveringProducts: [], recommendation: "마그네슘 시트레이트 보충제 추가 권장" },
        { nutrient: "비타민B12", dailyRecommended: "2.4μg", status: "sufficient", coveringProducts: ["센트룸"], recommendation: "" },
        { nutrient: "유산균", dailyRecommended: "1억CFU", status: "missing", coveringProducts: [], recommendation: "프로바이오틱스 제품 추가 권장" },
        { nutrient: "비타민C", dailyRecommended: "100mg", status: "partial", coveringProducts: ["센트룸"], recommendation: "센트룸에 60mg 포함. 과일 섭취로 보충 가능" }
      ],
      extractedNutrients: [
        { product: "종근당 비타민D 3000IU", nutrients: ["비타민D 3000IU", "칼슘 50mg"] },
        { product: "NOW Foods 오메가3", nutrients: ["EPA 360mg", "DHA 240mg", "비타민E 2mg"] },
        { product: "센트룸 멀티비타민", nutrients: ["비타민A", "B1", "B2", "B6", "B12 6μg", "비타민C 60mg", "비타민D 400IU", "비타민E", "철분 8mg", "아연 11mg", "칼슘 200mg", "구리 0.9mg"] }
      ]
    };

    // ═══════════════════════════════════════════
    // Tab Switching
    // ═══════════════════════════════════════════
    let activeTab = 'schedule';
    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
    }

    // ═══════════════════════════════════════════
    // Render
    // ═══════════════════════════════════════════
    function render(d) {
      const { summary, optimizedRoutine, technicalAnalysis, deficiencies, extractedNutrients } = d;

      const scoreColor = summary.healthScore >= 80 ? '#4ade80' : summary.healthScore >= 60 ? '#fbbf24' : '#f87171';
      const scoreGrade = summary.healthScore >= 90 ? '매우 좋음' : summary.healthScore >= 80 ? '좋음' : summary.healthScore >= 60 ? '개선 필요' : '주의 필요';
      const circ = 2 * Math.PI * 55;
      const offset = circ - (summary.healthScore / 100) * circ;

      const critCount = technicalAnalysis.filter(t => t.level === 'critical').length;
      const cautCount = technicalAnalysis.filter(t => t.level === 'caution').length;
      const synCount = technicalAnalysis.filter(t => t.level === 'info').length;
      const missCount = deficiencies.filter(d => d.status === 'missing').length;

      const dotCls = (time) => {
        if (time.includes('아침') || time.includes('오전')) return 'dot-morning';
        if (time.includes('저녁') || time.includes('오후')) return 'dot-evening';
        return 'dot-bedtime';
      };
      const dotIcon = (time) => {
        if (time.includes('아침') || time.includes('오전')) return '🌅';
        if (time.includes('저녁') || time.includes('오후')) return '🌙';
        return '🌌';
      };

      const triageLabel = { critical: '🚨 위험', caution: '⚡ 주의', info: '💡 참고' };
      const defIcons = { '비타민D':'☀️', '오메가3':'🐟', '마그네슘':'⚡', '비타민B12':'🧬', '유산균':'🦠', '비타민C':'🍊' };
      const statusLabel = { sufficient:'충족', partial:'부분 충족', missing:'미보유' };

      document.getElementById('app').innerHTML = `
        <div class="page-header">
          <h1>🔬 분석 결과</h1>
          <button class="close-btn">✕</button>
        </div>

        <!-- Score -->
        <div class="score-section anim">
          <div class="score-ring">
            <svg width="120" height="120" viewBox="0 0 120 120">
              <circle class="track" cx="60" cy="60" r="55"/>
              <circle class="fill" cx="60" cy="60" r="55" stroke="${scoreColor}"
                stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
                style="animation:scoreIn 1.5s ease"/>
            </svg>
            <div class="score-value" style="color:${scoreColor}">${summary.healthScore}</div>
          </div>
          <div class="score-label">Health Score</div>
          <div class="score-grade" style="color:${scoreColor}">${scoreGrade}</div>
        </div>

        <!-- Summary -->
        <div class="summary-card anim" style="animation-delay:0.1s">
          <div class="summary-headline">${summary.headline}</div>
          <div class="summary-action">
            <span>👉</span>
            <span>${summary.keyAction}</span>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-row anim" style="animation-delay:0.2s">
          <div class="stat-card">
            <div class="stat-icon">⚠️</div>
            <div class="stat-value">${critCount + cautCount}</div>
            <div class="stat-label">주의 사항</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-value">${synCount}</div>
            <div class="stat-label">시너지</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">💊</div>
            <div class="stat-value">3</div>
            <div class="stat-label">등록 영양제</div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs anim" style="animation-delay:0.3s">
          <button class="tab-btn active" data-tab="schedule" onclick="switchTab('schedule')">⏰ 복용 스케줄</button>
          <button class="tab-btn" data-tab="deep" onclick="switchTab('deep')">🧪 심층 분석</button>
          <button class="tab-btn" data-tab="deficiency" onclick="switchTab('deficiency')">🧬 결핍 체크 ${missCount > 0 ? '<span class="badge">' + missCount + '</span>' : ''}</button>
        </div>

        <!-- Tab 1: 복용 스케줄 -->
        <div class="tab-content active" id="tab-schedule">
          <div class="section-label">⏰ 맞춤 복용 시간표</div>
          ${optimizedRoutine.map(r => `
            <div class="routine-item">
              <div class="routine-dot ${dotCls(r.time)}">${dotIcon(r.time)}</div>
              <div class="routine-body">
                <div class="routine-time">${r.time}</div>
                <div class="routine-pills">${r.products.map(p => `<span class="r-pill">${p}</span>`).join('')}</div>
                <div class="routine-note">${r.note}</div>
                <div class="time-picker">🕐 08:00 <span style="font-size:9px;color:var(--text-dim)">탭하여 알림 설정</span></div>
              </div>
            </div>
          `).join('')}
          <div class="ai-disclaimer">⏰ 시간을 설정하면 복용 알림에 반영됩니다</div>
        </div>

        <!-- Tab 2: 심층 분석 -->
        <div class="tab-content" id="tab-deep">
          <div class="section-label">📋 성분 상호작용 (중요도 순)</div>
          ${technicalAnalysis.map(t => `
            <div class="triage-card ${t.level}">
              <div class="triage-header">
                <span class="triage-badge">${triageLabel[t.level]}</span>
                <span class="triage-title">${t.title}</span>
              </div>
              <div class="triage-detail">${t.detail}</div>
              ${t.action ? `<div class="triage-action">→ ${t.action}</div>` : ''}
              <div class="triage-prods">${t.products.map(p => `<span class="triage-prod">${p}</span>`).join('')}</div>
            </div>
          `).join('')}

          <div class="section-label" style="margin-top:20px">🧪 추출된 성분 목록</div>
          ${extractedNutrients.map(n => `
            <div class="nutrient-card">
              <div class="nutrient-name">💊 ${n.product}</div>
              <div class="nutrient-tags">${n.nutrients.map(t => `<span class="n-tag">${t}</span>`).join('')}</div>
            </div>
          `).join('')}

          <div class="ai-disclaimer">🤖 AI 분석 결과는 참고용입니다. 정확한 복용 상담은 약사 또는 의사에게 확인하세요.</div>
        </div>

        <!-- Tab 3: 결핍 체크 -->
        <div class="tab-content" id="tab-deficiency">
          <div class="section-label">🧬 핵심 6대 영양소 커버리지</div>
          <p style="font-size:11px;color:var(--text-sec);margin-bottom:14px;line-height:1.5;">
            등록된 영양제를 기준으로 핵심 영양소의 섭취 여부를 분석했어요.
          </p>

          ${['missing','partial','sufficient'].map(status => {
            const items = deficiencies.filter(d => d.status === status);
            if (items.length === 0) return '';
            const icon = status === 'missing' ? '🔴' : status === 'partial' ? '🟡' : '✅';
            const label = status === 'missing' ? '미섭취 영양소' : status === 'partial' ? '부분 충족' : '충족';
            return `
              <div style="font-size:12px;font-weight:600;margin:14px 0 8px;color:var(--text-sec)">${icon} ${label} (${items.length})</div>
              <div class="def-grid">
                ${items.map(d => `
                  <div class="def-card">
                    <div class="def-icon">${defIcons[d.nutrient] || '💊'}</div>
                    <div class="def-name">${d.nutrient}</div>
                    <div style="font-size:9px;color:var(--text-dim);margin-bottom:4px">${d.dailyRecommended}</div>
                    <span class="def-status ${d.status}">${statusLabel[d.status]}</span>
                    ${d.coveringProducts?.length ? `<div class="def-prods">📦 ${d.coveringProducts.join(', ')}</div>` : ''}
                    ${d.recommendation ? `<div class="def-rec">💡 ${d.recommendation}</div>` : ''}
                  </div>
                `).join('')}
              </div>
            `;
          }).join('')}

          <div class="ai-disclaimer">🤖 AI 분석 기반 참고 정보입니다. 개인별 건강 상태에 따라 다를 수 있으니 전문가와 상담하세요.</div>
        </div>
      `;
    }

    render(MOCK);
  </script>
</body>
</html>
